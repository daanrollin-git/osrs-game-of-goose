<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSRS Game of Goose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header / Navbar -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v1.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10V3.5C10 2.67 9.33 2 8.5 2S7 2.67 7 3.5 7.67 5 8.5 5z"/></svg>
        <span class="logo-text">OSRS Goose</span>
        <span class="logo-badge">LIVE</span>
      </div>
    </div>
    <div class="header-center">
      <div class="turn-indicator" id="turnIndicator">
        <span class="turn-label">Current Turn</span>
        <span class="turn-sep"></span>
        <span class="turn-team" id="turnTeamName">Waiting...</span>
      </div>
    </div>
    <div class="header-right">
      <div class="game-status not-started" id="gameStatus">Not Started</div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Board Area -->
    <div class="board-area">
      <div class="board-container">
        <div class="board" id="board">
          <!-- Tiles generated by JS -->
        </div>
      </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel">

      <!-- Dice Section -->
      <div class="panel-section dice-section">
        <h2 class="panel-title">Dice Roll</h2>
        <div class="dice-container" id="diceContainer">
          <div class="dice" id="dice1"></div>
          <div class="dice" id="dice2"></div>
        </div>
        <div class="dice-total" id="diceTotal">—</div>
      </div>

      <!-- Current Challenge -->
      <div class="panel-section challenge-section" id="challengeSection">
        <h2 class="panel-title">Current Challenge</h2>
        <div class="challenge-tile-name" id="challengeTileName">—</div>
        <div class="challenge-text" id="challengeText">
          Waiting for the game to start...
        </div>
      </div>

      <!-- Team Standings -->
      <div class="panel-section standings-section">
        <h2 class="panel-title">Standings</h2>
        <div class="standings-list" id="standingsList"></div>
      </div>

      <!-- Game Log -->
      <div class="panel-section log-section">
        <h2 class="panel-title">Game Log</h2>
        <div class="log-container" id="logContainer">
          <div class="log-entry log-system">Waiting for game to start...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Challenge Popup Overlay -->
  <div class="challenge-popup-overlay" id="challengePopup">
    <div class="challenge-popup">
      <div class="challenge-popup-icon" id="popupIcon">⚔️</div>
      <div class="challenge-popup-type" id="popupType">COMBAT</div>
      <div class="challenge-popup-name" id="popupName">Goblin Slayer</div>
      <div class="challenge-popup-text" id="popupText">Kill 25 Goblins</div>
      <div class="challenge-popup-team" id="popupTeam">Team 1</div>
    </div>
  </div>

  <script src="js/gameState.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
