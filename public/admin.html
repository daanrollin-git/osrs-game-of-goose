<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — OSRS Game of Goose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- Header -->
  <header class="admin-header">
    <div class="admin-header-left">
      <div class="admin-logo">
        <svg class="admin-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>Game Admin</span>
      </div>
      <span class="header-divider"></span>
      <span class="header-subtitle">OSRS Game of Goose</span>
    </div>
    <a href="/" class="view-board-link" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
      Open Board View
    </a>
  </header>

  <div class="admin-layout">
    <!-- Left Column: Controls -->
    <div class="admin-column controls-column">

      <!-- Game Control -->
      <section class="admin-section">
        <h2 class="section-heading">Game Control</h2>
        <div class="control-row">
          <button class="btn btn-start" id="btnStart" onclick="startGame()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><polygon points="5,3 19,12 5,21"/></svg>
            Start
          </button>
          <button class="btn btn-pause" id="btnPause" onclick="pauseGame()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            Pause
          </button>
          <button class="btn btn-reset" id="btnReset" onclick="resetGame()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Reset
          </button>
        </div>

        <div class="current-turn-display" id="currentTurnDisplay">
          <span class="turn-label">Current Turn</span>
          <span class="turn-team" id="adminTurnTeam">—</span>
        </div>

        <div class="control-row">
          <button class="btn btn-roll" id="btnRoll" onclick="doRollDice()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
            Roll Dice
          </button>
          <button class="btn btn-next" onclick="doNextTeam()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
            Next Team
          </button>
        </div>
      </section>

      <!-- Team Management -->
      <section class="admin-section">
        <h2 class="section-heading">Teams</h2>
        <div class="team-add-form">
          <input type="text" id="newTeamName" placeholder="Team name..." maxlength="20">
          <input type="color" id="newTeamColor" value="#6366f1">
          <button class="btn btn-add" onclick="addTeam()">Add</button>
        </div>
        <div class="team-list" id="teamList">
          <!-- Generated by JS -->
        </div>
      </section>

      <!-- Settings -->
      <section class="admin-section">
        <h2 class="section-heading">Settings</h2>
        <div class="settings-form">
          <label class="settings-label">
            <input type="checkbox" id="exactFinish" checked onchange="doUpdateSettings()">
            <span>Exact finish (must land on tile 63)</span>
          </label>
          <div class="settings-field">
            <label class="field-label">Board Name</label>
            <input type="text" id="boardName" value="OSRS Game of Goose" onchange="doUpdateSettings()">
          </div>
          <div class="settings-field">
            <label class="field-label">Dice Count</label>
            <select id="diceCount" onchange="doUpdateSettings()">
              <option value="1">1 die (1–6)</option>
              <option value="2" selected>2 dice (2–12)</option>
            </select>
          </div>
        </div>
        <div class="settings-actions">
          <button class="btn btn-export" onclick="exportTiles()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Export JSON
          </button>
          <button class="btn btn-import" onclick="document.getElementById('importFile').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Import JSON
          </button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importTiles(event)">
        </div>
      </section>

      <!-- Game Log -->
      <section class="admin-section">
        <h2 class="section-heading">Game Log</h2>
        <div class="admin-log" id="adminLog">
          <div class="log-entry">Waiting for game to start...</div>
        </div>
      </section>

    </div>

    <!-- Right Column: Tile Editor -->
    <div class="admin-column tile-column">
      <section class="admin-section tile-editor-section">
        <div class="tile-editor-header">
          <h2 class="section-heading" style="margin-bottom:0">Tile Editor</h2>
          <span class="tile-count" id="tileCountBadge">64 tiles</span>
        </div>

        <!-- Tile Grid Overview -->
        <div class="tile-grid" id="tileGrid">
          <!-- Generated by JS -->
        </div>

        <!-- Tile Edit Form -->
        <div class="tile-edit-panel" id="tileEditPanel" style="display:none;">
          <div class="tile-edit-header">
            <h3 id="editTileTitle">Edit Tile #0</h3>
          </div>
          <input type="hidden" id="editTileId">

          <div class="form-row">
            <div class="form-group">
              <label class="field-label">Type</label>
              <select id="editTileType" onchange="onTileTypeChange()"></select>
            </div>
            <div class="form-group">
              <label class="field-label">Tile Color</label>
              <input type="color" id="editTileColor" class="color-input">
            </div>
          </div>

          <div class="form-group">
            <label class="field-label">Name</label>
            <input type="text" id="editTileName" maxlength="30" placeholder="Tile name...">
          </div>

          <div class="form-group">
            <label class="field-label">Icon / Pictogram</label>
            <div class="icon-picker">
              <input type="text" id="editTileIcon" class="icon-input" maxlength="4">
              <div class="icon-presets" id="iconPresets"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="field-label">Challenge Description</label>
            <textarea id="editTileChallenge" rows="3" placeholder="What must the team do?"></textarea>
          </div>

          <div class="form-group special-group" id="specialGroup">
            <label class="field-label">Special Effect</label>
            <div class="special-fields">
              <select id="editSpecialAction">
                <option value="">None</option>
                <option value="roll_again">Roll Again</option>
                <option value="jump">Jump to Tile</option>
                <option value="skip_turns">Skip Turns</option>
                <option value="go_back">Go Back to Tile</option>
                <option value="prison">Prison (roll doubles)</option>
              </select>
              <input type="number" id="editSpecialTarget" placeholder="Target tile" min="0" max="63" style="display:none;">
              <input type="number" id="editSpecialTurns" placeholder="# turns" min="1" max="10" style="display:none;">
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-save" onclick="saveTileEdit()">Save Tile</button>
            <button class="btn btn-cancel" onclick="cancelTileEdit()">Cancel</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="js/gameState.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
